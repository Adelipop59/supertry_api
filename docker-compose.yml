version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: supertry_postgres
    restart: always
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: supertry
      POSTGRES_PASSWORD: supertry_password
      POSTGRES_DB: supertry_api
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U supertry']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: supertry_redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: supertry_libretranslate
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      - LT_LOAD_ONLY=fr,en,es,de,it,pt
      - LT_DISABLE_WEB_UI=false
    volumes:
      - libretranslate_data:/home/libretranslate/.local
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:5000/languages']
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  libretranslate_data:
    driver: local
